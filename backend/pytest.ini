[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    -v
    --tb=short
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (requires app running)
    slow: Tests that take > 1 second
