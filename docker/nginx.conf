events {
    worker_connections 1024;
}

http {
    # Performance
    sendfile on;
    keepalive_timeout 65;

    # Security headers
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=batch:10m rate=10r/m;
    limit_req_log_level warn;

    upstream api {
        server api:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Security headers applied to all responses
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Proxy timeouts — important for LLM-backed endpoints
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Health check endpoints — no rate limit, no auth
        location ~ ^/health {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth endpoints — strict rate limit (10/min per IP, burst 5)
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Batch events — medium rate limit (10/min, burst 3)
        location /api/v1/events/batch {
            limit_req zone=batch burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 10m;
        }

        # All other API — standard rate limit (120/min, burst 20)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API docs — disabled in production (FastAPI hides them; 404 here as extra safety)
        # In development: remove the return 404 block and let proxy_pass through.
        location ~ ^/(docs|redoc|openapi.json) {
            return 404;
        }

        # Default: 404
        location / {
            return 404;
        }
    }
}
